name: Build Kotoba

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with xcodebuild
        run: |
          xcodebuild \
            -project code/Kotoba.xcodeproj \
            -scheme Kotoba \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/Kotoba.app Payload/
          zip -r Kotoba.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Kotoba-ipa
          path: Kotoba.ipa
