name: Build IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build with xcodebuild
        run: |
          xcodebuild \
            -project Kotoba.xcodeproj \
            -scheme Kotoba \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: Kotoba-build
          path: build/
